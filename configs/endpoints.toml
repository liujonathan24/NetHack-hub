# vf-eval endpoint registry. Looked up by `-m <model>` lookup.
#
# Each block: model -> base URL + env var holding the key.
# Run vf-eval from the directory containing `configs/` or pass
# `--endpoints configs/endpoints.toml`.

[[endpoints]]
id   = "openai"
url  = "https://api.openai.com/v1"
key  = "OPENAI_API_KEY"
models = ["gpt-5.5", "gpt-5.5-mini", "gpt-5", "gpt-4.1-mini", "gpt-4.1", "gpt-4o-mini", "gpt-4o", "o1-mini", "o1"]

# Google Gemini via the OpenAI-compatible Generative Language endpoint.
# Used as the Experiment 2 rapid fix-iterate model (GEMINI_API_KEY is set on the
# dev box). Model ids are `gemini-*`; confirm the live id before spending. See
# approaches/voyager/reverse_curriculum_sweep.py::_endpoint_for for the same map.
[[endpoints]]
id   = "google"
url  = "https://generativelanguage.googleapis.com/v1beta/openai"
key  = "GEMINI_API_KEY"
models = ["gemini-2.5-pro", "gemini-2.5-flash", "gemini-2.5-flash-lite"]

[[endpoints]]
id   = "anthropic"
url  = "https://api.anthropic.com/v1"
key  = "ANTHROPIC_API_KEY"
models = ["claude-opus-4-7", "claude-sonnet-4-6", "claude-haiku-4-5"]

[[endpoints]]
id   = "pinference"
url  = "https://api.pinference.ai/api/v1"
key  = "PI_API_KEY"
models = ["Qwen/Qwen3.5-9B", "Qwen/Qwen3-8B", "Qwen/Qwen3-32B"]

# Prime Inference also serves the GLM family (z-ai/*). Same endpoint + key.
# Used for Continual-Harness runs: a weaker GLM policy + a stronger GLM teacher.
[[endpoints]]
id   = "pinference-glm"
url  = "https://api.pinference.ai/api/v1"
key  = "PI_API_KEY"
models = ["z-ai/glm-4.5", "z-ai/glm-4.5-air", "z-ai/glm-4.6", "z-ai/glm-4.7", "z-ai/glm-4.7-flash", "z-ai/glm-5", "z-ai/glm-5.1", "z-ai/glm-5.2"]
