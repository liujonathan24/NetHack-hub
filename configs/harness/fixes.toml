# fixes harness overlay (Experiment 2 — the candidate architecture under test).
# This is a TEMPLATE: fill in the actual architectural fixes you iterate on with
# Gemini, then validate the SAME file across GLM and GPT-5.5. Every field is
# consumed by environments/nethack/harness_overlay.py.
name = "fixes"

[system_prompt]
mode = "patch"     # line-prefix patch over the default SYSTEM_PROMPT
text = """
- Navigation: prefer autoexplore + move_to over single-step moves; never re-walk a blacklisted frontier.
- Memory: pin the current objective and overwrite stale journal notes; do not re-derive map state each turn.
"""

[per_step_prompt]
template = ""      # keep default variant unless a fix needs a different formatter

# Action-surface fix: retire the single-step `move` primitive so the policy must
# route through the high-level navigation skills the system prompt now mandates
# (autoexplore / move_to / find_and_descend). Reduces malformed step-by-step
# tool calls on weaker policies. `enabled = []` keeps every other skill; the
# mask is expressed purely via `disabled`.
[tools]
enabled = []
disabled = ["move"]

# Reward-shaping fix (keys are the stripped `_reward` suffix). The shipped rubric
# weights every reward at 1.0; this overlay up-weights genuine descent (2.0) and
# halves the scout/exploration bonus (0.5) so credit tracks depth reached rather
# than map churn. Unlisted rewards (success, ascension) keep the shipped 1.0.
[rewards]
descent = 2.0
scout   = 0.5
